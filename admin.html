<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1 style="text-align:center;">Админ-панель</h1>

<!-- ===== АВТОРИЗАЦИЯ ===== -->
<div id="loginBlock" style="max-width:400px;margin:50px auto;text-align:center;">
    <h2>Вход</h2>
    <input id="login" placeholder="Логин"><br><br>
    <input id="password" type="password" placeholder="Пароль"><br><br>
    <button onclick="login()">Войти</button>
</div>

<!-- ===== АДМИНКА ===== -->
<div id="adminPanel" style="display:none; max-width:700px; margin:20px auto;">

<h2>Добавить / Редактировать клан</h2>

<input id="clanName" placeholder="Название клана"><br><br>
<input id="clanId" placeholder="ID (например: storm)"><br><br>
<input id="clanLevel" placeholder="Уровень"><br><br>
<input id="clanAvatar" placeholder="Аватар (img/clan.png)"><br><br>

<button onclick="saveClan()">Сохранить</button>

<hr style="margin:40px 0;">

<h2>Добавить участника</h2>

<input id="memberClan" placeholder="ID клана"><br><br>
<input id="memberName" placeholder="Ник"><br><br>
<input id="memberAvatar" placeholder="Аватар (img/user.png)"><br><br>
<input id="memberTag" placeholder="Тег"><br><br>

<button onclick="addMember()">Добавить участника</button>

<hr style="margin:40px 0;">

<h2>Список кланов</h2>
<div id="clansList"></div>

</div>

<script src="admin.js"></script>
</body>
</html>
